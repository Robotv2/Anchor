name: Build

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-jdk17:
    name: full-jdk17
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run full verification
        run: ./gradlew clean fullVerification --no-daemon --stacktrace

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: full-jdk17-reports
          if-no-files-found: warn
          path: |
            **/build/test-results/**
            **/build/reports/tests/**
            **/build/reports/problems/**
            **/build/reports/jacoco/**

  smoke-jdk21:
    name: smoke-jdk21
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 17 and 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            17
            21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run fast tests and publication check on Java 21
        run: ./gradlew test publicationCheck -PtestRuntimeJava=21 --no-daemon --stacktrace

      - name: Upload smoke reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: smoke-jdk21-reports
          if-no-files-found: warn
          path: |
            **/build/test-results/**
            **/build/reports/tests/**
            **/build/reports/problems/**
